openapi: "3.0.3"
info:
  title: K8sPenTool-ng API
  description: |
    K8sPenTool-ng - Kubernetes Container Penetration Testing Platform

    Integrates CDK (Container Defense Kit) exploits with AI-driven attack chain automation.
    All endpoints use JSON request/response. Real-time events via WebSocket at `/api/v1/ws`.
  version: "2.0.0"
  contact:
    name: K8sPenTool Team
    url: https://github.com/trymonoly/K8sPenTool-ng

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Target
    description: Target configuration and session management
  - name: Info
    description: Information gathering and reconnaissance
  - name: Access
    description: Initial access to K8s components
  - name: Exec
    description: Command execution in pods/containers
  - name: Persist
    description: Persistence and backdoor deployment
  - name: Escape
    description: Container escape and privilege escalation
  - name: Lateral
    description: Lateral movement and credential access
  - name: Kubectl
    description: kubectl command operations
  - name: AI
    description: AI agent automation sessions
  - name: CDK
    description: CDK-inspired attack tactics and escape helpers

paths:
  # Health
  /health:
    get:
      tags: [Target]
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # Target
  /targets:
    post:
      tags: [Target]
      summary: Create a new target session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTargetRequest'
      responses:
        '201':
          description: Target created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
    get:
      tags: [Target]
      summary: List all targets
      responses:
        '200':
          description: List of targets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Target'

  /targets/{id}:
    get:
      tags: [Target]
      summary: Get target details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Target details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
    delete:
      tags: [Target]
      summary: Delete a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Target deleted

  /targets/{id}/steps:
    post:
      tags: [Target]
      summary: Record a step result for the active target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetStepRequest'
      responses:
        '200':
          description: Step recorded

  /proxy:
    get:
      tags: [Target]
      summary: Get global SOCKS5 proxy configuration
      responses:
        '200':
          description: Current proxy config or disabled status
    post:
      tags: [Target]
      summary: Set global SOCKS5 proxy configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProxyConfigRequest'
      responses:
        '200':
          description: Proxy configuration saved
    delete:
      tags: [Target]
      summary: Clear global SOCKS5 proxy configuration
      responses:
        '200':
          description: Proxy configuration cleared

  # Info
  /info/profiles:
    get:
      tags: [Info]
      summary: List evaluation profiles
      responses:
        '200':
          description: Available profiles

  /info/profiles/{id}/run:
    post:
      tags: [Info]
      summary: Run an evaluation profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            enum: [basic, extended, full]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
      responses:
        '200':
          description: Evaluation started

  /info/port-scan:
    post:
      tags: [Info]
      summary: Scan K8s ports on target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                ports:
                  type: string
              required: [host]
      responses:
        '200':
          description: Scan results

  /info/decode-capabilities:
    post:
      tags: [Info]
      summary: Decode Linux capability hex value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hex:
                  type: string
              required: [hex]
      responses:
        '200':
          description: Decoded capabilities

  /info/env-check-cmds:
    get:
      tags: [Info]
      summary: Get environment detection commands
      responses:
        '200':
          description: List of commands

  /info/priv-check-cmds:
    get:
      tags: [Info]
      summary: Get privilege check commands
      responses:
        '200':
          description: List of commands

  /info/sa-token-cmds:
    get:
      tags: [Info]
      summary: Get SA token extraction commands
      responses:
        '200':
          description: List of commands

  /info/port-reference:
    get:
      tags: [Info]
      summary: Get K8s port reference table
      responses:
        '200':
          description: Port reference data

  # Access - APIServer
  /access/api-server:
    post:
      tags: [Access]
      summary: Check APIServer access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
      responses:
        '200':
          description: Access check result

  /access/api-server/insecure:
    post:
      tags: [Access]
      summary: Check APIServer insecure port (8080)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
      responses:
        '200':
          description: Port check result

  /access/api-server/request:
    post:
      tags: [Access]
      summary: Send custom request to APIServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomAPIRequest'
      responses:
        '200':
          description: API response

  # Access - Kubelet
  /access/kubelet:
    post:
      tags: [Access]
      summary: Check Kubelet (10250) access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
      responses:
        '200':
          description: Access check result

  /access/kubelet/exec:
    post:
      tags: [Access]
      summary: Execute command via Kubelet API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubeletExecRequest'
      responses:
        '200':
          description: Command output

  # Access - Etcd
  /access/etcd/check:
    post:
      tags: [Access]
      summary: Check Etcd (2379) unauthorized access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                timeout_sec:
                  type: integer
              required: [target_host]
      responses:
        '200':
          description: Etcd access result

  /access/etcd/keys:
    post:
      tags: [Access]
      summary: List all Etcd keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Etcd keys

  /access/etcd/read:
    post:
      tags: [Access]
      summary: Read a specific Etcd key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                key:
                  type: string
              required: [target_host, key]
      responses:
        '200':
          description: Key value

  /access/etcd/v3/keys:
    post:
      tags: [Access]
      summary: Enumerate etcd v3 keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetHostRequest'
      responses:
        '200':
          description: Etcd v3 key range response

  /access/etcd/v3/search-secrets:
    post:
      tags: [Access]
      summary: Search etcd v3 for Kubernetes secret objects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetHostRequest'
      responses:
        '200':
          description: Etcd v3 secret search response

  /access/kubelet/inject-ssh:
    post:
      tags: [Access]
      summary: Try to inject an SSH public key via unauthenticated Kubelet exec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubeletSSHInjectRequest'
      responses:
        '200':
          description: Injection attempt results

  # Access - Dashboard
  /access/dashboard:
    post:
      tags: [Access]
      summary: Legacy dashboard probe alias
      description: Deprecated compatibility endpoint. Prefer `/dashboard/probe` for the unified Dashboard workflow.
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                port:
                  type: integer
                use_https:
                  type: boolean
              required: [target_host]
      responses:
        '200':
          description: Dashboard check result

  # Access - Kubeconfig
  /access/kubeconfig/parse:
    post:
      tags: [Access]
      summary: Parse kubeconfig content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
              required: [content]
      responses:
        '200':
          description: Parsed kubeconfig info

  # Exec
  /exec/api-server/list-pods:
    post:
      tags: [Exec]
      summary: List pods via APIServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecListRequest'
      responses:
        '200':
          description: Pod list

  /exec/api-server/exec:
    post:
      tags: [Exec]
      summary: Execute command in pod via APIServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PodExecRequest'
      responses:
        '200':
          description: Command output

  /exec/api-server/enum-sa-tokens:
    post:
      tags: [Exec]
      summary: Enumerate service account tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                namespace:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: SA tokens

  /exec/kubelet/list-pods:
    post:
      tags: [Exec]
      summary: List pods via Kubelet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Pod list from Kubelet

  /exec/kubelet/exec:
    post:
      tags: [Exec]
      summary: Execute command via Kubelet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubeletExecRequest'
      responses:
        '200':
          description: Command output

  /exec/backdoor/generate-yaml:
    post:
      tags: [Exec]
      summary: Generate backdoor pod YAML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackdoorConfig'
      responses:
        '200':
          description: Backdoor YAML

  /exec/rbac/check:
    post:
      tags: [Exec]
      summary: Check RBAC permissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: RBAC check result

  /exec/reverse-shell/generate:
    post:
      tags: [Exec]
      summary: Generate reverse shell payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lhost:
                  type: string
                lport:
                  type: string
                type:
                  type: string
                  enum: [bash-i, bash, python, perl, nc, nc-e, nc-mkfifo, php, ruby, lua, curl]
              required: [lhost, lport]
      responses:
        '200':
          description: Reverse shell payload

  /exec/upload-file:
    post:
      tags: [Exec]
      summary: Upload a local file into a pod container
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
      responses:
        '200':
          description: File upload result

  /exec/port-forward:
    post:
      tags: [Exec]
      summary: Generate port-forward and tunnel instructions for a pod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortForwardRequest'
      responses:
        '200':
          description: Port-forward guidance

  # Persist
  /persist/service-account:
    post:
      tags: [Persist]
      summary: Create high-privilege ServiceAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSARequest'
      responses:
        '200':
          description: SA creation result

  /persist/service-account/token:
    post:
      tags: [Persist]
      summary: Get ServiceAccount token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSARequest'
      responses:
        '200':
          description: SA token

  /persist/cronjob:
    post:
      tags: [Persist]
      summary: Deploy CronJob backdoor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CronJobRequest'
      responses:
        '200':
          description: CronJob deployment result

  /persist/daemonset:
    post:
      tags: [Persist]
      summary: Deploy DaemonSet backdoor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaemonSetRequest'
      responses:
        '200':
          description: DaemonSet deployment result

  /persist/kubeconfig:
    post:
      tags: [Persist]
      summary: Generate shadow kubeconfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                cluster:
                  type: string
                token:
                  type: string
              required: [server, token]
      responses:
        '200':
          description: Generated kubeconfig

  /persist/host-crontab:
    post:
      tags: [Persist]
      summary: Generate host persistence commands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lhost:
                  type: string
                lport:
                  type: string
              required: [lhost, lport]
      responses:
        '200':
          description: Host persistence commands

  # Escape
  /escape/checks:
    get:
      tags: [Escape]
      summary: Get escape condition checks
      responses:
        '200':
          description: Escape check commands

  /escape/privileged:
    post:
      tags: [Escape]
      summary: Privileged container escape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                namespace:
                  type: string
                pod_name:
                  type: string
                lhost:
                  type: string
                lport:
                  type: string
              required: [target_host, pod_name, lhost, lport]
      responses:
        '200':
          description: Escape commands

  /escape/mount:
    post:
      tags: [Escape]
      summary: Mount-based container escape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                escape_type:
                  type: string
                  enum: [chroot, crontab, docker.sock, procfs]
                lhost:
                  type: string
                lport:
                  type: string
              required: [escape_type, lhost, lport]
      responses:
        '200':
          description: Escape commands

  /escape/kernel-vulns:
    get:
      tags: [Escape]
      summary: Get kernel vulnerability reference
      responses:
        '200':
          description: Kernel vulnerability list

  # Lateral
  /lateral/secrets:
    post:
      tags: [Lateral]
      summary: List secrets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                namespace:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Secret list

  /lateral/secrets/view:
    post:
      tags: [Lateral]
      summary: View and decode a secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                namespace:
                  type: string
                secret_name:
                  type: string
                token:
                  type: string
              required: [target_host, namespace, secret_name]
      responses:
        '200':
          description: Decoded secret data

  /lateral/services:
    post:
      tags: [Lateral]
      summary: List services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                namespace:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Service list

  /lateral/endpoints:
    post:
      tags: [Lateral]
      summary: List endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Endpoint list

  /lateral/nodes:
    post:
      tags: [Lateral]
      summary: List nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Node list

  /lateral/network-policies:
    post:
      tags: [Lateral]
      summary: List network policies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Network policy list

  /lateral/taints:
    post:
      tags: [Lateral]
      summary: Show node taints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Node taints

  /lateral/taint-pod:
    post:
      tags: [Lateral]
      summary: Generate taint toleration pod YAML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                namespace:
                  type: string
                node_name:
                  type: string
                image:
                  type: string
                host_mount:
                  type: boolean
              required: [target_host]
      responses:
        '200':
          description: Taint pod YAML

  # Kubectl
  /kubectl/exec:
    post:
      tags: [Kubectl]
      summary: Execute arbitrary kubectl command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlCommandRequest'
      responses:
        '200':
          description: Command output

  /kubectl/get-pods:
    post:
      tags: [Kubectl]
      summary: kubectl get pods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Pod list

  /kubectl/get-nodes:
    post:
      tags: [Kubectl]
      summary: kubectl get nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Node list

  /kubectl/get-services:
    post:
      tags: [Kubectl]
      summary: kubectl get services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Service list

  /kubectl/get-secrets:
    post:
      tags: [Kubectl]
      summary: kubectl get secrets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Secret list

  /kubectl/get-deployments:
    post:
      tags: [Kubectl]
      summary: kubectl get deployments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Deployment list

  /kubectl/cluster-info:
    post:
      tags: [Kubectl]
      summary: Query cluster version information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Cluster version details

  /kubectl/auth-can-i:
    post:
      tags: [Kubectl]
      summary: Evaluate effective RBAC permissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Permission matrix and admin hint

  /kubectl/get-sa:
    post:
      tags: [Kubectl]
      summary: kubectl get serviceaccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Service account list

  /kubectl/get-crb:
    post:
      tags: [Kubectl]
      summary: kubectl get clusterrolebindings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: ClusterRoleBinding list

  /kubectl/get-images:
    post:
      tags: [Kubectl]
      summary: Aggregate images in running pods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Image inventory

  /kubectl/apply:
    post:
      tags: [Kubectl]
      summary: kubectl apply YAML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
                yaml:
                  type: string
              required: [target_host, yaml]
      responses:
        '200':
          description: Apply result

  /kubectl/delete:
    post:
      tags: [Kubectl]
      summary: kubectl delete resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host:
                  type: string
                token:
                  type: string
                username:
                  type: string
                password:
                  type: string
                skip_tls:
                  type: boolean
                timeout_sec:
                  type: integer
                yaml:
                  type: string
                resource:
                  type: string
                name:
                  type: string
                namespace:
                  type: string
              required: [target_host]
      responses:
        '200':
          description: Delete result

  # AI
  /ai/sessions:
    post:
      tags: [AI]
      summary: Create AI session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISessionCreateRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISessionDetailResponse'
    get:
      tags: [AI]
      summary: List AI sessions
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AISessionSummaryResponse'

  /ai/sessions/{id}:
    get:
      tags: [AI]
      summary: Get AI session details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISessionDetailResponse'
    delete:
      tags: [AI]
      summary: Delete an AI session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session deleted

  /ai/sessions/{id}/chat:
    post:
      tags: [AI]
      summary: Chat with AI agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIChatRequest'
      responses:
        '200':
          description: AI response

  /ai/sessions/{id}/plan:
    post:
      tags: [AI]
      summary: Generate attack plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIPlanRequest'
      responses:
        '200':
          description: Attack plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackPlan'
    get:
      tags: [AI]
      summary: Get current attack plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackPlan'

  /ai/sessions/{id}/approve:
    post:
      tags: [AI]
      summary: Approve a pending step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIApproveRequest'
      responses:
        '200':
          description: Step approved

  /ai/sessions/{id}/stop:
    post:
      tags: [AI]
      summary: Stop AI session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /ai/config:
    get:
      tags: [AI]
      summary: Get current LLM configuration metadata
      responses:
        '200':
          description: Current LLM configuration without exposing the API key
    put:
      tags: [AI]
      summary: Update LLM configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIConfigRequest'
      responses:
        '200':
          description: LLM configuration saved

  /dashboard/discover:
    post:
      tags: [Access]
      summary: Discover Dashboard-related services, pods, deployments, and ingresses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Dashboard discovery results

  /dashboard/probe:
    post:
      tags: [Access]
      summary: Probe Dashboard accessibility and auth bypass indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardProbeRequest'
      responses:
        '200':
          description: Dashboard probe results

  /dashboard/extract-token:
    post:
      tags: [Access]
      summary: Extract Dashboard-related service account tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Extracted Dashboard tokens

  /cdk/configmaps:
    post:
      tags: [CDK]
      summary: Dump ConfigMap inventory with key hints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: ConfigMap list

  /cdk/psp:
    post:
      tags: [CDK]
      summary: Query legacy PodSecurityPolicies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: PSP list or removal notice

  /cdk/docker-api:
    post:
      tags: [CDK]
      summary: Probe exposed Docker Remote API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DockerAPIRequest'
      responses:
        '200':
          description: Docker API accessibility result

  /cdk/shadow-apiserver:
    post:
      tags: [CDK]
      summary: Inspect kube-apiserver pods and generate a shadow manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Shadow API server assessment

  /cdk/clusterip-mitm:
    post:
      tags: [CDK]
      summary: Generate CVE-2020-8554 ClusterIP MITM manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MITMRequest'
      responses:
        '200':
          description: MITM manifest and notes

  /cdk/escape-pod:
    post:
      tags: [CDK]
      summary: Generate a CDK-style escape pod manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscapePodRequest'
      responses:
        '200':
          description: Escape pod manifest and follow-up commands

  /cdk/assess-escape:
    post:
      tags: [CDK]
      summary: Assess cluster-wide escape risk indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Escape risk assessment

  /cdk/evaluate-pod:
    post:
      tags: [CDK]
      summary: Run CDK-style in-pod environment evaluation checks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluatePodRequest'
      responses:
        '200':
          description: In-pod evaluation results

  /cdk/auto-escape:
    post:
      tags: [CDK]
      summary: Automatically choose the best candidate pod and attempt escape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoEscapeRequest'
      responses:
        '200':
          description: Auto-escape dry-run or execution result

  /cdk/services-scan:
    post:
      tags: [CDK]
      summary: Scan cluster services and endpoints with risk categorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubectlRequest'
      responses:
        '200':
          description: Internal service scan results

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        version:
          type: string

    Target:
      type: object
      properties:
        id:
          type: string
        host:
          type: string
        port:
          type: integer
        token:
          type: string
        auth_type:
          type: string
          enum: [none, token, cert, kubeconfig, userpass]
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer
        kubeconfig:
          type: string
        username:
          type: string
        password:
          type: string

    CreateTargetRequest:
      type: object
      required: [host]
      properties:
        host:
          type: string
        port:
          type: integer
          default: 6443
        token:
          type: string
        auth_type:
          type: string
          default: none
        skip_tls:
          type: boolean
          default: true
        timeout_sec:
          type: integer
          default: 10
        username:
          type: string
        password:
          type: string
        kubeconfig:
          type: string

    AIMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
        tool_call_id:
          type: string

    AIToolFunction:
      type: object
      properties:
        name:
          type: string
        arguments:
          type: string

    AIToolCall:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        function:
          $ref: '#/components/schemas/AIToolFunction'

    PendingToolAction:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        tool_call:
          $ref: '#/components/schemas/AIToolCall'

    AIHistoryEntry:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        tool_call_id:
          type: string
        pending_action_id:
          type: string

    AttackPlanStep:
      type: object
      properties:
        phase:
          type: string
        tool:
          type: string
        action:
          type: string
        description:
          type: string
        status:
          type: string

    AttackPlan:
      type: object
      properties:
        id:
          type: string
        target_id:
          type: string
        objective:
          type: string
        status:
          type: string
        current_step:
          type: integer
        created_at:
          type: string
          format: date-time
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AttackPlanStep'

    AISessionCreateRequest:
      type: object
      required: [target_id]
      properties:
        target_id:
          type: string
        host:
          type: string
        token:
          type: string
        username:
          type: string
        password:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer

    AISessionSummaryResponse:
      type: object
      properties:
        id:
          type: string
        target_id:
          type: string
        target:
          $ref: '#/components/schemas/Target'
        status:
          type: string
        pending_actions:
          type: array
          items:
            $ref: '#/components/schemas/PendingToolAction'
        created_at:
          type: string
          format: date-time
        can_resume_chat:
          type: boolean

    AISessionDetailResponse:
      allOf:
        - $ref: '#/components/schemas/AISessionSummaryResponse'
        - type: object
          properties:
            plan:
              $ref: '#/components/schemas/AttackPlan'
            messages:
              type: array
              items:
                $ref: '#/components/schemas/AIMessage'
            history:
              type: array
              items:
                $ref: '#/components/schemas/AIHistoryEntry'

    AIChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AIPlanRequest:
      type: object
      properties:
        objective:
          type: string

    AIApproveRequest:
      type: object
      properties:
        step_index:
          type: integer
        action_id:
          type: string

    AccessRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        token:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    TargetHostRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    KubeletSSHInjectRequest:
      type: object
      required: [target_host, ssh_pub_key]
      properties:
        target_host:
          type: string
        ssh_pub_key:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    CustomAPIRequest:
      type: object
      required: [target_host, path]
      properties:
        target_host:
          type: string
        path:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, DELETE]
        token:
          type: string
        body:
          type: string
        content_type:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    KubeletExecRequest:
      type: object
      required: [target_host, pod_name, command]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        pod_name:
          type: string
        container_name:
          type: string
        command:
          type: string
        token:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    ExecListRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        token:
          type: string
        username:
          type: string
        password:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    PodExecRequest:
      type: object
      required: [target_host, pod_name, command]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        pod_name:
          type: string
        container_name:
          type: string
        command:
          type: string
        token:
          type: string
        username:
          type: string
        password:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    BackdoorConfig:
      type: object
      properties:
        namespace:
          type: string
        image:
          type: string
        mount_path:
          type: string
        node_name:
          type: string
        lhost:
          type: string
        lport:
          type: string
        pod_name:
          type: string
        ssh_pub_key:
          type: string

    UploadFileRequest:
      type: object
      required: [target_host, pod_name, local_path, remote_path]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        pod_name:
          type: string
        container_name:
          type: string
        local_path:
          type: string
        remote_path:
          type: string
        token:
          type: string
        username:
          type: string
        password:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer

    PortForwardRequest:
      type: object
      required: [target_host, pod_name]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        pod_name:
          type: string
        pod_port:
          type: integer
        token:
          type: string
        username:
          type: string
        password:
          type: string
        skip_tls:
          type: boolean

    AdminSARequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        sa_name:
          type: string
        binding_name:
          type: string
        token:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    CronJobRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        name:
          type: string
        image:
          type: string
        schedule:
          type: string
        command:
          type: string
        token:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    DaemonSetRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        namespace:
          type: string
        name:
          type: string
        image:
          type: string
        mount_path:
          type: string
        command:
          type: string
        token:
          type: string
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    KubectlRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        token:
          type: string
        username:
          type: string
        password:
          type: string
        skip_tls:
          type: boolean
        kubeconfig_path:
          type: string
        kubeconfig:
          type: string
        timeout_sec:
          type: integer

    KubectlCommandRequest:
      allOf:
        - $ref: '#/components/schemas/KubectlRequest'
        - type: object
          required: [command]
          properties:
            command:
              type: string

    DockerAPIRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer

    MITMRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer
        target_ip:
          type: string
        victim_ip:
          type: string
        target_port:
          type: integer

    EscapePodRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer
        escape_mode:
          type: string
          enum: [privileged, docker-sock, host-proc, cap-dac, kubelet-log]
        command:
          type: string
        namespace:
          type: string
        node_name:
          type: string

    EvaluatePodRequest:
      type: object
      required: [target_host, pod_name]
      properties:
        target_host:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer
        namespace:
          type: string
        pod_name:
          type: string

    AutoEscapeRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string
        skip_tls:
          type: boolean
        timeout_sec:
          type: integer
        lhost:
          type: string
        lport:
          type: string
        dry_run:
          type: boolean

    TargetStepRequest:
      type: object
      required: [phase, tool, summary]
      properties:
        phase:
          type: string
          enum: [setup, info, access, exec, persist, escape, lateral, kubectl]
        tool:
          type: string
        summary:
          type: string
        details:
          type: string
        success:
          type: boolean
        risk_level:
          type: string
          enum: [info, low, medium, high, critical]
        source:
          type: string
        data:
          type: object
          additionalProperties: true

    ProxyConfigRequest:
      type: object
      required: [host, port]
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        password:
          type: string

    DashboardProbeRequest:
      type: object
      required: [target_host]
      properties:
        target_host:
          type: string
        dashboard_port:
          type: integer
        dashboard_path:
          type: string
        use_https:
          type: boolean
        timeout_sec:
          type: integer
        skip_tls:
          type: boolean

    AIConfigRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [openai, ollama, anthropic, custom]
        model:
          type: string
        api_key:
          type: string
        base_url:
          type: string
        clear_api_key:
          type: boolean
